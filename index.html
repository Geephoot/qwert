<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content ="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Shop</title>
    <style>
        * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, Helvetica, sans-serif;
}

body {
    background: linear-gradient(135deg, #1e1e2f, #2a2a40);
    color: white;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
#form{
    display:none
}
/* Карточка */
#main, #form {
    background: #2f2f4a;
    padding: 25px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 25px rgba(0,0,0,0.4);
    animation: fadeIn 0.4s ease;
}

/* Заголовок */
h1 {
    margin-bottom: 15px;
    font-size: 22px;
}

/* Картинка */
img {
    width: 100px;
    margin: 15px 0;
}

/* Текст */
p {
    font-size: 14px;
    opacity: 0.8;
    margin-bottom: 20px;
}

/* Кнопки */
button {
    background: linear-gradient(135deg, #5a7cff, #6ee7ff);
    border: none;
    padding: 12px;
    width: 100%;
    border-radius: 10px;
    color: white;
    font-size: 16px;
    cursor: pointer;
    transition: 0.2s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.3);
}

button:active {
    transform: scale(0.98);
}

/* Поля ввода */
input {
    width: 100%;
    padding: 10px;
    margin-bottom: 12px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: #1e1e2f;
    color: white;
}

/* Плейсхолдер */
input::placeholder {
    color: #aaa;
}

/* Анимация */
@keyframes fadeIn {
    from {
        opacity: 0;
        transform: translateY(15px);
    }
    to {
        opacity: 1;
        transform: translateY(0);
    }
}
    </style>
</head>
<body>
<body>
    <div id="main">
        <h1>Онлайн магазине</h1>
        <img src = "https://cdn-icons-png.flaticon.com/512/3595/3595455.png">
        <p>Lorem ipsom dotor sit amet, consectetur adieisicing elit. Accusantium insom magni, molestins . </p>
        <button id="buy">Купить</button>
    </div>
    <form id="form">
        <input type="text" placeholder="Name" id="user_name">
        <input type="text" placeholder="Email" id="user_email">
        <input type="text" placeholder="Phone" id="user_phone">
        <button id="order">Оформить</button>
    </form>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
        let tg = window.Telegram.WebApp;
        let buy = document.getElementById("buy");
        let order = document.getElementById("order");

        buy.addEventListener("click", () => {
            document.getElementId("main").style.display = "none";
            document.getElementId("form").style.display = "block";
            document.getElementId("user_name").value = tg.initDataUnsafe.first_name;
        });
    </script>


</body>
</html>
